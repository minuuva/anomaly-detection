AWSTemplateFormatVersion: '2010-09-09'
Description: 'DS5220 Data Project 1 - Anomaly Detection Pipeline'

Parameters:
  MyIPAddress:
    Type: String
    Default: '199.111.224.1/32'
    Description: Your IP address for SSH access
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/32$'
  
  KeyName:
    Type: String
    Default: ''
    Description: '(Optional) EC2 Key Pair name for SSH access. Leave empty if you dont have one.'

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  # ═══════════════════════════════════════════════════════════════════════
  # S3 Bucket for data storage
  # ═══════════════════════════════════════════════════════════════════════
  DataBucket:
    Type: AWS::S3::Bucket
    DependsOn: SNSTopicPolicy
    Properties:
      BucketName: !Sub 'ds5220-anomaly-detection-${AWS::AccountId}'
      NotificationConfiguration:
        TopicConfigurations:
          - Event: 's3:ObjectCreated:*'
            Topic: !Ref SNSTopic
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: 'raw/'
                  - Name: suffix
                    Value: '.csv'

  # ═══════════════════════════════════════════════════════════════════════
  # SNS Topic and Subscription
  # ═══════════════════════════════════════════════════════════════════════
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: 'ds5220-dp1'
      DisplayName: 'DS5220 Anomaly Detection Notifications'

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3ToPublish
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: 'sns:Publish'
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:s3:::ds5220-anomaly-detection-${AWS::AccountId}'

  SNSSubscription:
    Type: AWS::SNS::Subscription
    DependsOn: EC2Instance
    Properties:
      Protocol: http
      TopicArn: !Ref SNSTopic
      Endpoint: !Sub 'http://${ElasticIP}:8000/notify'

  # ═══════════════════════════════════════════════════════════════════════
  # IAM Role for EC2 Instance - FIXED: Added SSM permissions
  # ═══════════════════════════════════════════════════════════════════════
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ═══════════════════════════════════════════════════════════════════════
  # Security Group
  # ═══════════════════════════════════════════════════════════════════════
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for DS5220 anomaly detection instance'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIPAddress
          Description: 'SSH access from my IP'
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: '0.0.0.0/0'
          Description: 'FastAPI access from anywhere'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-security-group'

  # ═══════════════════════════════════════════════════════════════════════
  # Elastic IP
  # ═══════════════════════════════════════════════════════════════════════
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-elastic-ip'

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      EIP: !Ref ElasticIP

  # ═══════════════════════════════════════════════════════════════════════
  # EC2 Instance - FIXED: Log path and SSM support
  # ═══════════════════════════════════════════════════════════════════════
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id}}'
      InstanceType: t3.micro
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          
          # Log all output to a bootstrap log file
          exec > >(tee -a /var/log/user-data.log)
          exec 2>&1
          
          echo "=========================================="
          echo "Starting bootstrap at $(date)"
          echo "=========================================="
          
          # Update system and install dependencies
          echo "Updating system packages..."
          apt-get update -y
          apt-get upgrade -y
          
          echo "Installing Python and Git..."
          apt-get install -y git python3 python3-pip python3-venv
          
          # Clone the repository
          echo "Cloning anomaly-detection repository..."
          cd /opt
          git clone https://github.com/minuuva/anomaly-detection.git
          cd /opt/anomaly-detection
          
          # Create virtual environment
          echo "Creating virtual environment..."
          python3 -m venv /opt/anomaly-detection/venv
          
          # Install Python dependencies
          echo "Installing Python dependencies..."
          /opt/anomaly-detection/venv/bin/pip install --upgrade pip
          /opt/anomaly-detection/venv/bin/pip install -r /opt/anomaly-detection/requirements.txt
          
          # Set BUCKET_NAME environment variable globally in /etc/environment
          echo "Setting BUCKET_NAME in /etc/environment..."
          echo "BUCKET_NAME='${DataBucket}'" >> /etc/environment
          
          # Export BUCKET_NAME for current session
          export BUCKET_NAME='${DataBucket}'
          echo "BUCKET_NAME set to: ${DataBucket}"
          
          # Create systemd service for FastAPI - FIXED LOG PATH
          echo "Creating systemd service..."
          cat > /etc/systemd/system/anomaly-detection.service << 'EOF'
          [Unit]
          Description=Anomaly Detection FastAPI Service
          After=network.target
          
          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/anomaly-detection
          Environment="BUCKET_NAME=${DataBucket}"
          ExecStart=/opt/anomaly-detection/venv/bin/fastapi run /opt/anomaly-detection/app.py --host 0.0.0.0 --port 8000
          Restart=always
          RestartSec=10
          StandardOutput=append:/opt/anomaly-detection/app.log
          StandardError=append:/opt/anomaly-detection/app.log
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          # Replace ${DataBucket} in the service file with actual bucket name
          sed -i "s/\${DataBucket}/${DataBucket}/g" /etc/systemd/system/anomaly-detection.service
          
          # Reload systemd, enable and start service
          echo "Starting FastAPI service..."
          systemctl daemon-reload
          systemctl enable anomaly-detection.service
          systemctl start anomaly-detection.service
          
          # Wait for service to start
          sleep 10
          
          # Check service status
          systemctl status anomaly-detection.service --no-pager
          
          echo "=========================================="
          echo "Bootstrap completed at $(date)"
          echo "FastAPI should be running on port 8000"
          echo "Bucket: ${DataBucket}"
          echo "=========================================="
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2-instance'

# ═══════════════════════════════════════════════════════════════════════
# Outputs
# ═══════════════════════════════════════════════════════════════════════
Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref EC2Instance
    
  ElasticIP:
    Description: 'Elastic IP Address'
    Value: !Ref ElasticIP
    
  APIEndpoint:
    Description: 'FastAPI Endpoint URL'
    Value: !Sub 'http://${ElasticIP}:8000'
    
  HealthCheckURL:
    Description: 'Health Check Endpoint'
    Value: !Sub 'http://${ElasticIP}:8000/health'
    
  DocsURL:
    Description: 'API Documentation'
    Value: !Sub 'http://${ElasticIP}:8000/docs'
    
  BucketName:
    Description: 'S3 Bucket Name'
    Value: !Ref DataBucket
    
  SNSTopicArn:
    Description: 'SNS Topic ARN'
    Value: !Ref SNSTopic
    
  SSMSessionCommand:
    Description: 'AWS SSM Session Manager command to connect'
    Value: !Sub 'aws ssm start-session --target ${EC2Instance}'